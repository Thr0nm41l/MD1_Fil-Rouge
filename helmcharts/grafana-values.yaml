# Grafana Configuration for MD1 Infrastructure
# Uses the official grafana/grafana chart (https://grafana.github.io/helm-charts)

# Admin credentials sourced from a Kubernetes secret
# Create with: kubectl create secret generic grafana-admin-credentials \
#   --from-literal=admin-user=admin \
#   --from-literal=admin-password=<your-password> \
#   -n monitoring
admin:
  existingSecret: grafana-admin-credentials
  userKey: admin-user
  passwordKey: admin-password

# Datasource credentials injected via a K8s secret mounted as env vars.
# Grafana expands ${VAR} in provisioning files at runtime.
extraEnvFrom:
  - secretRef:
      name: grafana-datasource-credentials   # created by start_infra.sh from .env

persistence:
  enabled: true
  size: 2Gi

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

# Pre-configured datasources
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
        access: proxy
        isDefault: true
        jsonData:
          timeInterval: "30s"

      - name: PostgreSQL
        type: postgres
        uid: postgresql
        url: postgres-postgresql.datalake.svc.cluster.local:5432
        user: postgres
        access: proxy
        secureJsonData:
          password: "${POSTGRES_ADMIN_PASSWORD}"
        jsonData:
          database: airflow
          sslmode: disable
          maxOpenConns: 10
          maxIdleConns: 2
          connMaxLifetime: 14400
          postgresVersion: 1500
          timescaledb: false

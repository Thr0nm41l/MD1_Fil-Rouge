auth:
  enablePostgresUser: true
  existingSecret: postgres-credentials   # created by start_infra.sh from .env
  secretKeys:
    adminPasswordKey: postgres-password  # key for the postgres superuser
    userPasswordKey: airflow-password    # key for the airflow user
  username: airflow
  database: airflow

primary:
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "2Gi"
  persistence:
    enabled: true
    size: 5Gi

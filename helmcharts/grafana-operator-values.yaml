# Grafana Operator Configuration
# Modern, non-deprecated approach for deploying Grafana

# Operator configuration
grafana-operator:
  # Create a default Grafana instance
  grafana:
    enabled: true

# Resources for the operator itself
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Enable metrics for the operator
metrics:
  enabled: true

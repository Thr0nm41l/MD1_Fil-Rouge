# Grafana Datasources for Grafana Operator
# These are automatically configured when applied
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: prometheus-datasource
  namespace: monitoring
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  datasource:
    name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
    isDefault: true
    jsonData:
      timeInterval: "30s"
      httpMethod: "POST"
    editable: true
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: monitoring
type: Opaque
stringData:
  password: postgresadmin
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: postgresql-datasource
  namespace: monitoring
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  datasource:
    name: PostgreSQL
    type: postgres
    access: proxy
    url: postgres-postgresql.datalake.svc.cluster.local:5432
    database: postgres
    user: postgres
    secureJsonData:
      password:
        valueFrom:
          secretKeyRef:
            name: postgres-credentials
            key: password
    jsonData:
      sslmode: "disable"
      postgresVersion: 1300
      timescaledb: false
    editable: true

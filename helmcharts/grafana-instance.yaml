# Grafana Instance for Grafana Operator
# This creates the actual Grafana deployment
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin-credentials
  namespace: monitoring
type: Opaque
stringData:
  admin-user: admin
  admin-password: Gr@f@n@Admin123
---
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  namespace: monitoring
  labels:
    dashboards: "grafana"
spec:
  config:
    log:
      mode: "console"
    auth:
      disable_login_form: "false"
    security:
      admin_user:
        valueFrom:
          secretKeyRef:
            name: grafana-admin-credentials
            key: admin-user
      admin_password:
        valueFrom:
          secretKeyRef:
            name: grafana-admin-credentials
            key: admin-password
    server:
      root_url: "http://localhost:3000"
    users:
      allow_sign_up: "false"
      auto_assign_org: "true"
      auto_assign_org_role: "Viewer"
    auth.anonymous:
      enabled: "false"

  deployment:
    spec:
      replicas: 1
      template:
        spec:
          containers:
            - name: grafana
              image: grafana/grafana:latest
              imagePullPolicy: IfNotPresent
              resources:
                limits:
                  cpu: 500m
                  memory: 512Mi
                requests:
                  cpu: 250m
                  memory: 256Mi

  persistentVolumeClaim:
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi

  service:
    metadata:
      name: grafana-service
    spec:
      type: ClusterIP
      ports:
        - name: grafana
          port: 3000
          protocol: TCP
          targetPort: 3000

  ingress:
    enabled: false

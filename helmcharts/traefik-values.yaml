api:
  dashboard: true
  insecure: true

ingressClass:
  enabled: true
  isDefaultClass: false
  name: traefik

service:
  type: LoadBalancer

providers:
  kubernetesIngress:
    enabled: true
    publishedService:
      enabled: true
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: true

rbac:
  enabled: true

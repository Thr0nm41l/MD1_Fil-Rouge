executor: CeleryExecutor

env:
  - name: _PIP_ADDITIONAL_REQUIREMENTS
    value: "faker bcrypt"
  - name: AIRFLOW__CORE__TEST_CONNECTION
    value: "Enabled"

fernetKeySecretName: airflow-fernet-key                      # created by start_infra.sh from .env; key: fernet-key

data:
  metadataSecretName: airflow-metadata-credentials           # created by start_infra.sh from .env
  resultBackendSecretName: airflow-result-backend-credentials  # created by start_infra.sh from .env

config:
  celery:
    worker_concurrency: 4

postgresql:
  enabled: true
  replicas: 1
  auth:
    username: airflow
    database: airflow
    existingSecret: airflow-postgres-credentials   # created by start_infra.sh; key: postgresql-password
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  persistence:
    enabled: true
    size: 3Gi

redis:
  enabled: true
  persistence:
    enabled: false
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

webserver:
  replicas: 1
  service:
    type: NodePort

scheduler:
  replicas: 1

workers:
  celery:
    replicas: 2
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "2Gi"

triggerer:
  enabled: true

dags:
  gitSync:
    enabled: true
    repo: https://github.com/Thr0nm41l/MD1_Fil-Rouge.git
    branch: main
    rev: HEAD
    subPath: dags
    wait: 30

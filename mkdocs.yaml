site_name: Ecotrack Documentation
site_description: Documentation for the Ecotrack project, covering infrastructure, pipelines, and best practices.
site_author: Ecotrack Team

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  features:
